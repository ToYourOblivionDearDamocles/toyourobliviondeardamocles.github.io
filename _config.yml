title: "Hopping into Applied Math"
author: "Taorui Wang"
description: "Applied Math, Machine Learning and AI"
permalink: /:title/
lang: "en"
excerpt_separator: "\n\n\n"
date_format: "%B %d, %Y"

collections:
  works:
    output: true
    permalink: /works/:name/

defaults:
  - scope:
      path: ""
      type: "works"
    values:
      layout: "page"

# Layout

show_excerpts: false        # show article excerpts on the home page
show_frame: true           # adds a gray frame to the site
show_sidebar: false        # show a sidebar instead of the usual header
minimal: false             # use a dark header

# Menu

navigation: 
  - {file: "README.md"}               # accepts {file, title, url, icon, sidebaricon}
  - {file: "index.html"}
  - {file: "work_collection.html"}

external:
  - {title: Google Scholar, url: "https://scholar.google.com/citations?hl=en&user=Tqg6iq4AAAAJ"}
 

comments:
#  disqus_shortname: ""    # see https://disqus.com/
#  isso_domain: ""         # see https://posativ.org/isso/

plugins:
 - jekyll-feed
